name: Playwright CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.meta.outputs.node-version }}
      test-scope: ${{ steps.meta.outputs.test-scope }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve CI metadata
        id: meta
        shell: bash
        run: |
          echo "node-version=20" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "test-scope=smoke" >> "$GITHUB_OUTPUT"
          else
            echo "test-scope=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.meta.outputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.install.outputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.install.outputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run typecheck

  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
    steps:
      - name: Summarize quality gate
        run: echo "Lint and type checking completed successfully."

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - install
      - code_quality
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.install.outputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare report directories
        shell: bash
        run: |
          mkdir -p test-results/json
          mkdir -p test-results/junit
          mkdir -p playwright-report
          mkdir -p test-results/artifacts

      - name: Run app-specific Playwright suites
        shell: bash
        env:
          CI: 'true'
        run: |
          failures=0

          if [ "${{ needs.install.outputs.test-scope }}" = "smoke" ]; then
            runs=(
              "saucedemo:smoke"
              "cura:smoke"
              "orangehrm:smoke"
              "local:shared-api"
            )
          else
            runs=(
              "saucedemo:auth"
              "saucedemo:smoke"
              "saucedemo:regression"
              "saucedemo:accessibility"
              "saucedemo:shared-auth"
              "cura:auth"
              "cura:smoke"
              "cura:regression"
              "cura:shared-auth"
              "orangehrm:auth"
              "orangehrm:smoke"
              "orangehrm:accessibility"
              "orangehrm:shared-auth"
              "local:shared-api"
            )
          fi

          for run in "${runs[@]}"; do
            IFS=':' read -r app suite <<< "$run"
            echo "Running suite ${app}/${suite}"

            if ! node scripts/run-app-suite.cjs --app="$app" --suite="$suite" --project=chromium; then
              failures=1
            fi
          done

          exit "$failures"

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results-by-app-suite
          path: test-results/junit/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: json-results-by-app-suite
          path: test-results/json/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report-by-app-suite
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload raw test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raw-test-results-by-app-suite
          path: test-results/
          if-no-files-found: warn
          retention-days: 30

  publish_report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs:
      - install
      - test
    if: always()
    steps:
      - name: Download pipeline artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected-artifacts

      - name: Build run summary
        shell: bash
        run: |
          echo "## Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test scope: \`${{ needs.install.outputs.test-scope }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Test result: \`${{ needs.test.result }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Generated app/suite artifacts" >> "$GITHUB_STEP_SUMMARY"
          find collected-artifacts -maxdepth 3 -type f | sort | sed 's#^#- `#; s#$#`#' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated CI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-artifacts-${{ github.run_number }}
          path: collected-artifacts/
          if-no-files-found: warn
          retention-days: 30
